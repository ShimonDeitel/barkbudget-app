name: Barkbudget
options:
  bundleIdPrefix: com.shimondeitel.petbudget
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Barkbudget:
    type: application
    platform: iOS
    sources:
      - path: Barkbudget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petbudget
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Barkbudget/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BarkbudgetTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BarkbudgetTests
    dependencies:
      - target: Barkbudget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petbudget.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BarkbudgetUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BarkbudgetUITests
    dependencies:
      - target: Barkbudget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petbudget.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Barkbudget:
    build:
      targets:
        Barkbudget: all
        BarkbudgetTests: [test]
        BarkbudgetUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Barkbudget.storekit
    test:
      config: Debug
      storeKitConfiguration: Barkbudget.storekit
      targets:
        - BarkbudgetTests
        - BarkbudgetUITests
    archive:
      config: Release
